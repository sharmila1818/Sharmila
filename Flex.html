<!DOCTYPE html>
<html>
    <head>
        <title>flex</title>
    <style>
        .flexbox{
            display: flex;
            flex-direction: row;
            justify-content: left;
            gap: 20px;
            background-color: aqua;
        }
        div div{
            background-color: chocolate;
            color: aliceblue;
            margin: 5px;
        }
    </style>
    </head>
    <body>
        <div class="flexbox">
            <div>Box1</div>
            <div>Box2</div>
            <div>Box3</div>
            <div>Box4</div>
            <div>Box5</div>
            <div>Box6</div>
        </div>
    </body>
</html>
