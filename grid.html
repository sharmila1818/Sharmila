<!DOCTYPE html>
<html>
    <head>
        <title>grid</title>
    <style>
        .grid{
            display: grid;
            grid-template-columns: 50px 50px 100px;
            background-color: rgb(219, 154, 154);
            width: 200px;
            overflow: scroll;
        }
        div div{
            background-color: rgb(180, 99, 124);
            margin: 10px;
        }
    </style>
    </head>
    <body>
        <div class="grid">
            <div>Box1</div>
            <div>Box2</div>
            <div>Box3</div>
            <div>Box4</div>
            <div>Box5</div>
            <div>Box6</div>
        </div>
    </body>
</html>
